# Orquestra o AI Data Analyst Agent: API + dashboard.
# ANTHROPIC_API_KEY é opcional — sem ela, a narrativa usa o fallback determinístico.
services:
  api:
    build: .
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8000:8000"

  dashboard:
    build: .
    command: streamlit run app/dashboard.py --server.port 8501 --server.address 0.0.0.0
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8501:8501"
    depends_on:
      - api
